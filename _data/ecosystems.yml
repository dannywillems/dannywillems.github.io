# =============================================================================
# Contributions by ecosystem / product
#
# This file drives the /ecosystems/ page. It is fully configurable: add,
# remove or reorder ecosystems and repositories here and the page updates
# automatically. Nothing on the page is hard-coded.
#
# Schema
# ------
# ecosystems:                     # ordered list, rendered top to bottom
#   - name:        string         # ecosystem / product name (required)
#     type:        string         # what it is, e.g. "Blockchain",
#                                 #   "Security platform" (optional label)
#     description: string         # short blurb about the ecosystem (optional)
#     website:     url            # link rendered next to the title (optional)
#
#     # Each ecosystem renders three tabs: Repositories, Blog articles and
#     # Documentation. The three lists below feed those tabs. Any list may be
#     # omitted or left empty; its tab then shows an empty-state message.
#
#     repositories:               # "Repositories" tab
#       - name:        string     # display name, e.g. "owner/repo" (required)
#         url:         url        # link to the repository (required)
#         description: string     # what the repo is / what I did (optional)
#         language:    string     # primary language, shown as a tag (optional)
#         role:        string     # my role, e.g. "Core contributor" (optional)
#         period:      string     # involvement window, e.g. "2023 - 2026"
#         state:       enum       # maintenance state of the repo (see below)
#         vibe_coded:  bool       # true => largely AI/"vibe" coded (optional)
#         me_url:      url        # link to *my* commits in this repo. When
#                                 #   omitted it is derived automatically from
#                                 #   url: GitHub -> /commits?author=dannywillems,
#                                 #   GitLab -> /-/commits/master?author=dannywillems.
#                                 #   Set it explicitly when the default branch
#                                 #   is not master or the url is a subpath.
#
#     blog:                       # "Blog articles" tab
#       - title:       string     # article title (required)
#         url:         url        # link to the article (required)
#         publication: string     # where it was published (optional)
#         role:        string     # Author / Co-author / Contributor (optional)
#         date:        string     # when, e.g. "2025-03" or "2025" (optional)
#         description: string     # short blurb (optional)
#
#     documentation:              # "Documentation" tab (same fields as blog)
#       - title:       string     # doc page / section title (required)
#         url:         url        # link to the documentation (required)
#         publication: string     # site / project it belongs to (optional)
#         role:        string     # Author / Contributor / Translator (optional)
#         date:        string     # when (optional)
#         description: string     # short blurb (optional)
#
# Allowed values for `state` (controls the coloured badge):
#   maintained   - actively maintained, accepting changes
#   active       - under active development
#   deprecated   - superseded / being phased out
#   archived     - read-only / no longer developed
#   inactive     - alive but largely dormant
#
# `vibe_coded: true` adds a separate badge flagging repositories that were
# predominantly written by "vibe coding" (heavy AI assistance, light review).
# Defaults to false when omitted.
#
# Repos default to GitHub. Non-GitHub repos (e.g. GitLab) work too; just
# point `url` at the right place.
# =============================================================================

ecosystems:
  - name: Mina
    type: Blockchain
    website: https://minaprotocol.com
    description: >-
      Mina is a layer-1 blockchain that stays a constant size (~22 KB) by
      recursively composing zero-knowledge proofs. During my time at o1Labs I
      worked across the protocol, its proof systems, and the full rewrite of the
      node in Rust.
    repositories:
      - name: MinaProtocol/mina
        url: https://github.com/MinaProtocol/mina
        description: >-
          The reference Mina node. Contributions to Pickles (the recursion
          layer) and the broader cryptography stack.
        language: OCaml
        role: Core contributor
        period: 2023 - 2026
        state: maintained
        vibe_coded: false

      - name: o1-labs/proof-systems
        url: https://github.com/o1-labs/proof-systems
        description: >-
          The proof systems powering Mina. Work on Kimchi (the PlonK-based
          prover), custom gates and lookups, the Arrabbiata folding scheme, and
          the o1VM zkVM for MIPS.
        language: Rust
        role: Core contributor / maintainer
        period: 2023 - 2026
        state: maintained
        vibe_coded: false

      - name: o1-labs/mina-rust
        url: https://github.com/o1-labs/mina-rust
        description: >-
          Full rewrite of the Mina node from OCaml to Rust, aiming to improve
          performance, maintainability and developer accessibility.
        language: Rust
        role: Core contributor
        period: 2025 - 2026
        state: active
        vibe_coded: false

      - name: o1-labs/o1js
        url: https://github.com/o1-labs/o1js
        description: >-
          TypeScript framework for writing zk-SNARKs and zkApps on Mina.
        language: TypeScript
        role: Contributor
        period: 2023 - 2025
        state: maintained
        vibe_coded: false

      - name: o1-labs/snarky
        url: https://github.com/o1-labs/snarky
        description: >-
          OCaml DSL for verifiable computation, the foundation of Mina's
          circuits.
        language: OCaml
        role: Contributor
        period: 2023 - 2025
        state: maintained
        vibe_coded: false

      - name: o1-labs/cargo-specification
        url: https://github.com/o1-labs/cargo-specification
        description: >-
          Tool to generate specifications from Rust code and comments, used to
          document the proof-systems library.
        language: Rust
        role: Contributor
        period: 2023 - 2025
        state: maintained
        vibe_coded: false

      - name: o1-labs/ocaml-gen
        url: https://github.com/o1-labs/ocaml-gen
        description: >-
          Automatic generation of OCaml bindings from Rust, bridging
          proof-systems with the OCaml node.
        language: Rust
        role: Contributor
        period: 2023 - 2025
        state: maintained
        vibe_coded: false

      - name: MinaProtocol/c-reference-signer
        url: https://github.com/MinaProtocol/c-reference-signer
        description: >-
          Reference C implementation of the Mina transaction signer.
        language: C
        role: Contributor
        period: 2023 - 2025
        state: maintained
        vibe_coded: false

      - name: MinaProtocol/docs2
        url: https://github.com/MinaProtocol/docs2
        description: >-
          Documentation website for the Mina Protocol.
        language: JavaScript
        role: Contributor
        period: 2023 - 2025
        state: maintained
        vibe_coded: false

