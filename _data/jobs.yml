      end: May 2025
  description: |
    o1Labs incubated the Mina Protocol, a layer-1 blockchain
    using zero-knowledge proofs for succinctness.

    - Oversaw cryptography architecture across a 15-20 person
      engineering team as Head of Cryptography.
    - Led a team of up to 5 engineers on the full rewrite of
      the Mina node from OCaml to Rust.
    - Contributed to [Kimchi](https://github.com/o1-labs/proof-systems)
      (custom gates, lookups) and
      [Pickles](https://github.com/MinaProtocol/mina/tree/compatible/src/lib/crypto/pickles)
      (recursion layer based on Halo2).
    - Contributed to [o1js](https://github.com/o1-labs/o1js),
      the TypeScript SDK for writing zkApps.
    - Co-designed [o1VM](https://github.com/o1-labs/proof-systems/tree/master/o1vm),
      a zkVM for MIPS. Built the RISC-V interpreter and folding
      layer, low-level optimizations for witness generation
      (see talks below).
    - Designed [Arrabbiata](https://github.com/o1-labs/proof-systems/tree/master/arrabbiata),
      a folding scheme for arbitrary custom gates and degrees.
